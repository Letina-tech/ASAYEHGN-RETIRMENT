 <div class="Videos">

<div class="Video-b">
    <div class="carouselExampleAutoplaying">

            </video>

            <br>
            <button class="btn" onclick="playPause()">Play/Pause</button>
            <button class="btn" onclick="halfSize()">Half Size</button>
            <button class="btn" onclick="normalSize()">Normal Size</button>

            <h2 onclick="playPause()" style="font-size: 15px; color: rgb(102, 102, 168);" >This plays or pauses my videos!</h2>
          </div>
        </Div>
    </div>
</div>

<script>
    let myVideo = document.querySelector(".my-videos");

    function playPause() {
        if (myVideo.paused){
            myVideo.play();
        }else{
            myVideo.pause();
        }
    }

    function halfSize() {
       myVideo.width = "300"
    }
    function normalSize() {
       myVideo.width = "600"
    }
</script>
